# render.yaml
# One-click deploy to Render.com (free tier)

services:
  # ── FastAPI API ───────────────────────────────────────────────────────────────
  - type: web
    name: rag-chatbot-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: redis
          name: rag-redis
          property: connectionString
      - key: CHROMA_PERSIST_DIR
        value: ./data/chromadb
      - key: UPLOAD_DIR
        value: ./data/uploads
      - key: SQLITE_PATH
        value: ./data/metadata.db
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile

  # ── Streamlit Chat UI ─────────────────────────────────────────────────────────
  - type: web
    name: rag-chatbot-ui
    runtime: python
    buildCommand: pip install streamlit requests
    startCommand: streamlit run frontend/user_app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    plan: free
    envVars:
      - key: API_URL
        value: https://rag-chatbot-api.onrender.com

  # ── Streamlit Admin UI ────────────────────────────────────────────────────────
  - type: web
    name: rag-chatbot-admin
    runtime: python
    buildCommand: pip install streamlit requests
    startCommand: streamlit run frontend/admin_app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    plan: free
    envVars:
      - key: API_URL
        value: https://rag-chatbot-api.onrender.com

  # ── Redis ─────────────────────────────────────────────────────────────────────
  - type: redis
    name: rag-redis
    plan: free
    ipAllowList: []